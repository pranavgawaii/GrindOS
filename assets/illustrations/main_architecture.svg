<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="500" fill="#FBF3EC" />
  
  <style>
    .font { font-family: monospace; font-weight: 300; font-size: 14px; fill: #1A1A1A; }
    .label { font-family: monospace; font-weight: 300; font-size: 12px; fill: #E8593C; }
    .box { fill: none; stroke: #1A1A1A; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
    .box-accent { fill: #E8593C; stroke: #E8593C; stroke-width: 1; }
    .accent-text { fill: #FBF3EC; font-weight: bold; }
    .arrow { fill: none; stroke: #1A1A1A; stroke-width: 1; stroke-dasharray: 4 4; }
  </style>

  <!-- Central Hub: FastAPI Core -->
  <path class="box" d="M 330 220 Q 332 218 350 221 L 450 219 Q 453 220 452 240 L 449 260 Q 448 263 430 262 L 332 261 Q 328 260 330 240 Z" />
  <text x="355" y="245" class="font">FastAPI Core</text>

  <!-- Left Spoke: Client GUI -->
  <path class="box" d="M 120 222 L 220 218 L 222 258 L 118 262 Z" />
  <text x="140" y="245" class="font">Client GUI</text>
  
  <!-- Arrow: Client to FastAPI -->
  <path class="arrow" d="M 230 240 Q 280 235 320 240" />
  <polygon points="320,240 315,237 315,243" fill="#1A1A1A" />
  <text x="250" y="235" class="label">request</text>

  <!-- Top Right Spoke: Judge0 Exec -->
  <path class="box" d="M 550 100 L 650 102 L 648 142 L 552 140 Z" />
  <text x="565" y="125" class="font">Judge0 Exec</text>
  
  <!-- Arrow: FastAPI to Judge0 -->
  <path class="arrow" d="M 430 220 Q 480 180 540 130" />
  <polygon points="540,130 533,130 537,135" fill="#1A1A1A" />
  <text x="495" y="165" class="label">execute</text>

  <!-- Right Spoke (Core Action): LLM Router -->
  <path class="box-accent" d="M 550 220 L 660 218 L 658 262 L 552 260 Z" />
  <text x="565" y="245" class="font accent-text">LLM Router</text>
  
  <!-- Arrow: FastAPI to LLM -->
  <path class="arrow" d="M 460 240 Q 500 245 540 240" />
  <polygon points="540,240 535,237 535,243" fill="#1A1A1A" />
  <text x="480" y="235" class="label">prompt</text>

  <!-- Bottom Right Spoke: Clerk API -->
  <path class="box" d="M 550 340 L 650 342 L 648 382 L 552 380 Z" />
  <text x="565" y="365" class="font">Clerk API</text>
  
  <!-- Arrow: FastAPI to Clerk -->
  <path class="arrow" d="M 430 260 Q 480 300 540 350" />
  <polygon points="540,350 537,345 533,350" fill="#1A1A1A" />
  <text x="495" y="315" class="label">auth</text>

  <!-- Top Spoke to LLM: Profile JSON -->
  <path class="box" d="M 555 30 L 655 28 L 652 68 L 553 70 Z" />
  <text x="560" y="55" class="font">Profile JSON</text>
  
  <!-- Arrow: Profile to LLM -->
  <path class="arrow" d="M 605 80 Q 610 150 605 210" />
  <polygon points="605,210 602,205 608,205" fill="#1A1A1A" />
  <text x="615" y="150" class="label">context</text>

</svg>
