<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OA Practice Copilot | GrindOS</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="assets/mobile.css" />

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <style>
    /* Practice specific styles integrating with GrindOS tokens */
    body {
      background-color: var(--bg);
      color: var(--text-1);
      font-family: var(--font-sans);
    }
    
    .practice-container {
      max-width: 900px;
      margin: 60px auto 120px;
      padding: 0 24px;
    }
    
    .practice-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .practice-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    
    .practice-header h1 span {
      color: var(--brand);
    }
    
    .practice-header p {
      color: var(--text-3);
      font-size: 1.05rem;
    }

    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-1);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }
    
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-light);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .submit-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 16px 32px;
      border-radius: var(--radius);
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--brand-glow);
    }
    
    .submit-btn:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Results Section */
    .results-container {
      display: none;
      animation: slideUp 0.5s ease;
    }
    
    .result-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    
    .section-header {
      padding: 20px 24px;
      background: var(--bg-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 600;
      font-size: 1.1rem;
      user-select: none;
      color: var(--text-1);
    }
    
    .section-header:hover {
      background: var(--bg-3);
    }
    
    .section-content {
      padding: 24px;
      display: none;
      color: var(--text-2);
      line-height: 1.7;
      font-size: 1.05rem;
    }
    
    .section-content.active {
      display: block;
    }
    
    .section-content h4 {
      color: var(--text-1);
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    .section-content h4:first-child {
      margin-top: 0;
    }
    
    .section-content p {
      margin-bottom: 16px;
    }

    .section-icon {
      margin-right: 14px;
      font-size: 1.25rem;
    }

    .toggle-icon {
      transition: transform 0.3s ease;
      color: var(--text-3);
    }
    
    .active + .toggle-icon {
      transform: rotate(180deg);
    }

    pre code {
      border-radius: var(--radius) !important;
      padding: 20px !important;
      font-family: var(--font-mono) !important;
      font-size: 0.95rem;
      background: var(--code-bg) !important;
      border: 1px solid var(--border);
      display: block;
      overflow-x: auto;
    }
    
    /* Code container & Copy Btn */
    .code-container {
      position: relative;
      margin-bottom: 16px;
    }
    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.2); }
    
    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
      gap: 32px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--text-2);
      padding: 12px 0;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text-1); }
    .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab-content { display: none; animation: slideUp 0.3s ease; }
    .tab-content.active { display: block; }
    
    /* OCR Premium Button */
    .ocr-btn {
      background: var(--bg-2);
      border: 1px solid var(--border);
      color: var(--text-2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .ocr-btn:hover {
      background: var(--bg-3);
      color: var(--text-1);
      border-color: var(--brand);
    }
    .ocr-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .premium-star {
      color: #fbbf24;
    }
    
    .badge-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .test-badge {
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .test-badge.pass { background: rgba(34, 197, 94, 0.1); color: #16a34a; border: 1px solid rgba(34, 197, 94, 0.2); }
    .test-badge.fail { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .dark .test-badge.pass { color: #4ade80; }
    .dark .test-badge.fail { color: #f87171; }
    
    .complexity-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-family: var(--font-mono);
      color: var(--brand);
      margin-right: 12px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 16px;
      text-align: left;
    }
    th {
      background: var(--bg-2);
      font-weight: 600;
      color: var(--text-1);
    }

    .loading-spinner {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 60px;
      flex-direction: column;
      gap: 20px;
      color: var(--brand);
      font-weight: 500;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--brand-light);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="dark"> <!-- Ensure Dark Mode fits default GrindOS -->

  <!-- Top Navigation (Dynamically injected) -->
  <header class="topbar">
    <a href="dashboard.html" class="topbar-brand">
      <img src="logo.png" alt="GrindOS Logo" class="brand-logo" style="width: 34px; height: 34px; object-fit: contain; border-radius: 4px; flex-shrink: 0; display: inline-block; vertical-align: middle; margin-right: 4px;">
      <span class="brand-wordmark">GrindOS</span>
    </a>
    <nav class="topbar-nav">
      <a href="dashboard.html" class="learn-nav">Learn</a>
      <a href="tracker.html" class="tracker-nav">Tracker</a>
      <a href="practice.html" class="practice-nav active">Practice</a>
      <a href="interview-prep/index.html" class="prep-nav">Prep</a>
      <a href="resume-builder.html" class="resume-nav" style="display: inline-block;">Resume</a>
    </nav>
    <div class="topbar-right auth-buttons" id="auth-container">
      <button class="icon-btn theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode" style="margin-right: 12px; display: none;">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </header>

  <div class="practice-container">
    <div class="practice-header">
      <h1>OA Practice <span>Copilot</span></h1>
      <p>Paste an OA problem to get a humanized breakdown and verified execution.</p>
    </div>

    <div class="input-card">
      <div class="form-row">
        <div class="form-group" style="flex: 1;">
          <label for="language">Language</label>
          <select id="language">
            <option value="python">Python 3</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="javascript">JavaScript</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1.5;">
          <label for="environment">Environment Context</label>
          <select id="environment">
            <option value="leetcode">LeetCode Style (Class/Function)</option>
            <option value="oa" selected>OA Style (Full sys.stdin script)</option>
          </select>
        </div>
        <div class="form-group" style="flex: 1.5;">
          <label for="verbosity">Analysis Mode</label>
          <select id="verbosity">
            <option value="detailed">Detailed Analysis</option>
            <option value="concise" selected>Just Code & Explanation</option>
          </select>
        </div>
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <label for="constraints">Constraints / Requirements (Optional)</label>
        <input type="text" id="constraints" placeholder="e.g. O(N) time, O(1) space, no built-in sort" />
      </div>
      
      <div class="form-group" style="margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px;">
          <label for="problem" style="margin: 0;">Problem Statement (or your stuck attempt)</label>
          <div class="ocr-premium-btn" id="ocrBtnWrapper">
            <input type="file" id="ocrInput" accept="image/png, image/jpeg, image/webp" style="display: none;" />
            <button class="ocr-btn" id="ocrTrigger" title="Premium Feature">
              <span class="premium-star">✨</span> Extract from Image
            </button>
          </div>
        </div>
        <textarea id="problem" placeholder="Paste the full problem description here, or paste your code and ask for help..."></textarea>
      </div>
      

      <button id="analyzeBtn" class="submit-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Analyze & Solve
      </button>
    </div>

    <div class="loading-spinner" id="loading">
      <div class="spinner"></div>
      <p>Running AI analysis and verifying code via Judge0...</p>
    </div>

    <div class="results-container" id="results">
      <!-- Sections will be injected here by practice.js -->
    </div>
    
  </div>

  <!-- Mobile Bottom Nav -->
  <nav class="mobile-bottom-nav" id="mobile-bottom-nav">
    <a href="dashboard.html" class="mobile-nav-item" id="mnav-learn">
      <span class="mobile-nav-icon">📚</span>
      <span>Learn</span>
    </a>
    <a href="tracker.html" class="mobile-nav-item" id="mnav-tracker">
      <span class="mobile-nav-icon">⚡</span>
      <span>Tracker</span>
    </a>
    <a href="practice.html" class="mobile-nav-item active" id="mnav-practice">
      <span class="mobile-nav-icon">💻</span>
      <span>Practice</span>
    </a>
    <a href="interview-prep/index.html" class="mobile-nav-item" id="mnav-prep">
      <span class="mobile-nav-icon">🎯</span>
      <span>Prep</span>
    </a>
    <a href="resume-builder.html" class="mobile-nav-item" id="mnav-resume" style="display: flex;">
      <span class="mobile-nav-icon">📄</span>
      <span>Resume</span>
    </a>
  </nav>

  <!-- External clerk library for auth injected by script.js -->
  <script src="assets/script.js"></script>
  <script src="assets/practice.js"></script>
</body>
</html>
