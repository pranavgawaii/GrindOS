<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>• GrindOS Secure Viewer</title>
    <!-- Use Plus Jakarta Sans font to match GrindOS -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo_cropped.png">
    <!-- Google Fonts for Premium Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Hardcoded TOC Map from parsed documents -->
    <script src="assets/toc_maps.js"></script>
    <style>
        :root {
            --bg-main: #121212;
            --bg-dark: #000000;
            --bg-lighter: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --accent: #EA763F;
            --glass-border: rgba(255, 255, 255, 0.1);
            --controls-bg: rgba(18, 18, 18, 0.8);
            --btn-bg: rgba(255, 255, 255, 0.08);
            --sidebar-w: 280px;
        }

        :root.light {
            --bg-main: #F8FAFC;
            --bg-dark: #F1F5F9;
            --bg-lighter: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #475569;
            --glass-border: rgba(0, 0, 0, 0.1);
            --controls-bg: rgba(255, 255, 255, 0.8);
            --btn-bg: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: var(--bg-grid);
            background-size: 40px 40px;
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            
            /* CRITICAL SECURITY: Disable text selection */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Toolbar / Glassmorphism Header */
        #toolbar {
            width: 100%;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            box-sizing: border-box;
            z-index: 100;
        }

        .brand {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: var(--text-main);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand .title-text {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.2s ease;
            margin-right: 4px;
        }

        .back-btn:hover {
            background: rgba(128, 128, 128, 0.1);
            color: var(--accent);
        }

        .controls {
            display: flex;
            align-items: center;
            background: var(--controls-bg);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            margin: 0 auto;
        }

        button {
            background: transparent;
            border: none;
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button:hover:not(:disabled) {
            background: var(--btn-bg);
            color: var(--accent);
            transform: translateY(-2px);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        button.active-toggle {
            background: var(--text-main);
            color: var(--bg-dark);
        }

        .page-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            min-width: 90px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        #page_num {
            color: var(--text-main);
            font-weight: 600;
        }

        .control-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-left: 1px solid var(--glass-border);
            padding-left: 12px;
            margin-left: 4px;
        }

        /* Layout Container */
        .layout-container {
            display: flex;
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 60px);
            overflow: hidden;
            position: relative;
        }

        /* Sidebar / TOC */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--bg-lighter);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .sidebar.collapsed {
            margin-left: calc(var(--sidebar-w) * -1);
        }

        .sidebar-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toc-list {
            list-style: none;
            overflow-y: auto;
            padding: 0 32px 32px 32px;
            margin: 0;
        }
        .toc-chapter {
            color: #EA763F;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 24px;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(234, 118, 63, 0.2);
            user-select: none;
        }
        .toc-chapter:first-child {
            margin-top: 0;
        }
        .toc-sublist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .toc-item {
            padding: 6px 0;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.4;
        }
        .toc-list a:hover {
            background: var(--btn-bg);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            transform: translateX(4px);
        }
        .toc-item-num {
            color: #EA763F;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            min-width: 22px;
        }
        .toc-item.nested {
            padding-left: 15px;
            border-left: 1px solid var(--glass-border);
        }
        .empty-toc {
            padding: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Document Container */
        #pdf-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 90px;
            box-sizing: border-box;
            position: relative;
        }

        #pdf-container::-webkit-scrollbar { width: 10px; }
        #pdf-container::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.1); }
        #pdf-container::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.2); border-radius: 5px; }

        #canvas-wrapper {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            transform-origin: top center;
        }

        canvas {
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(128,128,128,0.1);
            background-color: white; 
            max-width: 100%;
        }

        /* Floating Nav Arrows (No Glow) */
        .floating-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--controls-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 90;
            transition: all 0.2s ease;
        }

        :root.light button:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.05);
        }

        .floating-nav-btn:hover:not(.disabled) {
            background: rgba(255, 255, 255, 1);
            color: var(--bg-dark);
            transform: translateY(-50%) scale(1.05);
        }

        .floating-nav-btn.disabled {
            opacity: 0.15;
            cursor: not-allowed;
            background: rgba(255,255,255,0.03);
        }

        .left-nav { left: 24px; }
        .right-nav { right: 24px; }

        /* Premium Loading Screen */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .product-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 240px;
        }

        .pulse-logo {
            width: 48px;
            height: 48px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-radius: 8px;
        }

        .loader-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-fill {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 30%;
            background: var(--text-main);
            border-radius: 2px;
            animation: loadSlide 1.5s ease-in-out infinite;
        }

        .status-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
        }

        @keyframes loadSlide {
            0% { left: -30%; width: 30%; }
            50% { width: 50%; }
            100% { left: 100%; width: 30%; }
        }

        /* Anti-Download Overlay */
        .security-overlay {
            position: fixed;
            top: 60px; left: 0; right: 0; bottom: 0;
            z-index: 9999;
            pointer-events: none;
        }

        /* Responsive Mobile View */
        @media (max-width: 768px) {
            .brand .title-text { 
                font-size: 0.9rem;
            }
            .brand .title-text span {
                display: inline-block;
                max-width: 120px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .brand .title-text img {
                width: 22px !important; 
                height: 22px !important;
            }
            .controls { gap: 6px; padding: 4px 8px; }
            button { padding: 6px 8px; font-size: 0.85rem; }
            .page-info { min-width: 60px; font-size: 0.8rem; }
            .control-group { padding-left: 6px; margin-left: 2px; }
            #twopage-btn, #fullscreen-btn { display: none; } /* Disable 2-page and fullscreen on mobile */
            .floating-nav-btn { width: 40px; height: 40px; font-size: 1rem; }
            .left-nav { left: 10px; }
            .right-nav { right: 10px; }
            #pdf-container { padding: 12px 4px; }
            .sidebar { 
                position: absolute; 
                top: 0; bottom: 0; left: 0; 
                width: 80%; 
                max-width: 320px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }
            .sidebar.collapsed { margin-left: -100%; }
        }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;">

    <div id="toolbar" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div class="brand" style="flex: 1;">
            <a href="notes.html" class="back-btn" title="Back to Notes Library"><i class="fas fa-arrow-left"></i></a>
            <!-- Sidebar Toggle moved to Left Side -->
            <button id="sidebar-toggle" title="Table of Contents" style="margin-left: 8px;"><i class="fas fa-bars"></i></button>
            <div class="title-text" style="margin-left: 8px;">
                <img src="logo_cropped.png" alt="Logo" style="width: 22px; height: 22px; border-radius: 4px;"> 
                <span id="header-title">GrindOS Secure Viewer</span>
            </div>
        </div>
        
        <div class="controls" style="flex: 1; display: flex; justify-content: center;">
            <div class="control-group">
                <button id="prev" disabled><i class="fas fa-chevron-up"></i></button>
                <div class="page-info">
                    <span id="page_num">-</span> / <span id="page_count">-</span>
                </div>
                <button id="next" disabled><i class="fas fa-chevron-down"></i></button>
            </div>
            
            <div class="control-group">
                <button id="zoom_out" title="Zoom Out"><i class="fas fa-search-minus"></i></button>
                <button id="zoom_in" title="Zoom In"><i class="fas fa-search-plus"></i></button>
            </div>
            
            <div class="control-group">
                <button id="twopage-btn" title="Two Page View"><i class="fas fa-book-open"></i></button>
                <button id="fullscreen-btn" title="Fullscreen"><i class="fas fa-expand"></i></button>
            </div>
        </div>
        
        <div class="right-actions" style="flex: 1; display: flex; justify-content: flex-end;">
            <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme"><span class="theme-icon">☾</span></button>
        </div>
    </div>

    <div class="layout-container">
        <!-- Table of Contents Sidebar -->
        <aside class="sidebar collapsed" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-book"></i> Table of Contents
            </div>
            <ul class="toc-list" id="toc-list">
                <!-- TOC items injected here -->
            </ul>
        </aside>

        <div id="pdf-container">
            <!-- Premium Loader -->
            <div class="loader-overlay" id="loading-indicator">
                <div class="product-loader">
                    <img src="logo_cropped.png" class="pulse-logo" alt="GrindOS">
                    <div class="loader-bar">
                        <div class="loader-fill"></div>
                    </div>
                    <div class="status-text" id="status-message">Initializing Engine...</div>
                </div>
            </div>

            <!-- Floating Nav -->
            <div class="floating-nav-btn left-nav disabled" id="float-prev"><i class="fas fa-chevron-left"></i></div>
            <div class="floating-nav-btn right-nav disabled" id="float-next"><i class="fas fa-chevron-right"></i></div>

            <!-- Pages -->
            <div id="canvas-wrapper">
                <canvas id="the-canvas" style="display: none;"></canvas>
                <canvas id="the-canvas-right" style="display: none;"></canvas>
            </div>
        </div>
    </div>

    <div class="security-overlay"></div>

    <script>
        // -------------------------------------------------------------------
        // SECURITY PRECAUTIONS
        // -------------------------------------------------------------------
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                if (['p', 's', 'c', 'x', 'a', 'u'].includes(e.key.toLowerCase())) {
                    e.preventDefault();
                    return false;
                }
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key))) {
                e.preventDefault();
                return false;
            }
        });
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault());

        // -------------------------------------------------------------------
        // PDF.js INITIALIZATION
        // -------------------------------------------------------------------
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            scale = 1.3,
            isTwoPage = false,
            canvas = document.getElementById('the-canvas'),
            ctx = canvas.getContext('2d'),
            canvasRight = document.getElementById('the-canvas-right'),
            ctxRight = canvasRight.getContext('2d');

        const btnPrev = document.getElementById('prev');
        const btnNext = document.getElementById('next');
        const floatPrev = document.getElementById('float-prev');
        const floatNext = document.getElementById('float-next');
        const btnTwoPage = document.getElementById('twopage-btn');
        const btnFullscreen = document.getElementById('fullscreen-btn');
        const btnSidebar = document.getElementById('sidebar-toggle');
        const btnTheme = document.getElementById('theme-toggle');
        const elPageNum = document.getElementById('page_num');
        const elPageCount = document.getElementById('page_count');
        const elLoading = document.getElementById('loading-indicator');
        const elStatusMsg = document.getElementById('status-message');
        const sidebar = document.getElementById('sidebar');
        const tocList = document.getElementById('toc-list');

        let audioCtx;
        function getAudioCtx() {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          return audioCtx;
        }

        let tickBuf;
        function ensureTickBuf(ac) {
          if (tickBuf && tickBuf.sampleRate === ac.sampleRate) return tickBuf;
          const rate = ac.sampleRate;
          const len = Math.floor(rate * 0.006);
          const buf = ac.createBuffer(1, len, rate);
          const ch = buf.getChannelData(0);
          for (let i = 0; i < len; i++) {
            const t = i / len;
            const sine = Math.sin(2 * Math.PI * 3400 * t);
            const noise = Math.random() * 2 - 1;
            ch[i] = (sine * 0.6 + noise * 0.4) * Math.pow(1 - t, 3);
          }
          tickBuf = buf;
          return buf;
        }

        let lastSnd = 0;
        function playTickSound() {
          const now = performance.now();
          if (now - lastSnd < 80) return;
          lastSnd = now;
          try {
            const ac = getAudioCtx();
            const buf = ensureTickBuf(ac);
            const src = ac.createBufferSource();
            const gain = ac.createGain();
            src.buffer = buf;
            gain.gain.value = 0.08;
            src.connect(gain);
            gain.connect(ac.destination);
            src.start();
          } catch (e) {}
        }

        const attId = 'att_pdfviewer';
        btnTheme.innerHTML = `
          <svg class="att-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="overflow: visible; transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);">
            <mask id="${attId}">
              <rect x="0" y="0" width="100%" height="100%" fill="white" />
              <circle class="att-mask-circle" cx="33" cy="0" r="9" fill="black" style="transition: cx 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), cy 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);" />
            </mask>
            <circle class="att-center-circle" cx="12" cy="12" fill="currentColor" stroke="none" mask="url(#${attId})" r="5" style="transition: r 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);" />
            <g class="att-rays" style="transform-origin: 12px 12px; transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);">
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="5.64" y1="5.64" x2="4.22" y2="4.22" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              <line x1="5.64" y1="18.36" x2="4.22" y2="19.78" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            </g>
          </svg>
        `;

        const updateSwitchMorph = (isLight) => {
          const svg = btnTheme.querySelector('.att-svg');
          const maskCircle = btnTheme.querySelector('.att-mask-circle');
          const centerCircle = btnTheme.querySelector('.att-center-circle');
          const rays = btnTheme.querySelector('.att-rays');
          if (!svg) return;

          if (!isLight) {
            svg.style.transform = 'rotate(270deg)';
            maskCircle.setAttribute('cx', '17');
            maskCircle.setAttribute('cy', '8');
            centerCircle.setAttribute('r', '9');
            rays.style.opacity = '0';
            rays.style.transform = 'scale(0) rotate(-30deg)';
          } else {
            svg.style.transform = 'rotate(0deg)';
            maskCircle.setAttribute('cx', '33');
            maskCircle.setAttribute('cy', '0');
            centerCircle.setAttribute('r', '5');
            rays.style.opacity = '1';
            rays.style.transform = 'scale(1) rotate(0deg)';
          }
        };

        const savedTheme = localStorage.getItem('GrindOS-theme');
        if (savedTheme === 'light') document.documentElement.classList.add('light');
        updateSwitchMorph(document.documentElement.classList.contains('light'));

        btnTheme.addEventListener('click', () => {
            document.documentElement.classList.toggle('light');
            const isLight = document.documentElement.classList.contains('light');
            localStorage.setItem('GrindOS-theme', isLight ? 'light' : 'dark');
            updateSwitchMorph(isLight);
            playTickSound();
        });

        function updateButtons() {
            const isPrevDisabled = pageNum <= 1;
            const isNextDisabled = isTwoPage ? pageNum + 1 >= pdfDoc.numPages : pageNum >= pdfDoc.numPages;
            
            btnPrev.disabled = isPrevDisabled;
            btnNext.disabled = isNextDisabled;
            
            if (isPrevDisabled) floatPrev.classList.add('disabled');
            else floatPrev.classList.remove('disabled');
            
            if (isNextDisabled) floatNext.classList.add('disabled');
            else floatNext.classList.remove('disabled');
            
            if (isTwoPage && pageNum + 1 <= pdfDoc.numPages) {
                elPageNum.textContent = `${pageNum}-${pageNum + 1}`;
            } else {
                elPageNum.textContent = pageNum;
            }
        }

        async function renderSingleCanvas(num, currentCanvas, currentCtx) {
            const page = await pdfDoc.getPage(num);
            const retinaScale = scale * 2.0; 
            let viewport = page.getViewport({scale: retinaScale});

            // Double buffering to prevent flicker
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d', { alpha: false });
            tempCanvas.width = viewport.width;
            tempCanvas.height = viewport.height;
            
            // Fill white background before rendering
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

            let renderContext = {
                canvasContext: tempCtx,
                viewport: viewport
            };
            
            await page.render(renderContext).promise;
            
            // Swap to visible canvas instantly
            currentCanvas.width = viewport.width;
            currentCanvas.height = viewport.height;
            currentCanvas.style.width = (viewport.width / 2) + "px";
            currentCanvas.style.height = (viewport.height / 2) + "px";
            
            // Fill background of main canvas to prevent transparent flash
            currentCtx.fillStyle = '#ffffff';
            currentCtx.fillRect(0, 0, currentCanvas.width, currentCanvas.height);
            currentCtx.drawImage(tempCanvas, 0, 0);
            
            currentCanvas.style.display = 'block';
        }

        async function renderPage(num) {
            pageRendering = true;
            try {
                if (!isTwoPage) {
                    canvasRight.style.display = 'none';
                }
                
                await renderSingleCanvas(num, canvas, ctx);
                if (isTwoPage && num + 1 <= pdfDoc.numPages) {
                    await renderSingleCanvas(num + 1, canvasRight, ctxRight);
                }
            } catch(err) {
                console.error("Render error: ", err);
            }
            
            pageRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
            updateButtons();
            document.getElementById('pdf-container').scrollTop = 0;
        }

        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function onPrevPage() {
            if (pageNum <= 1) return;
            pageNum = isTwoPage ? Math.max(1, pageNum - 2) : pageNum - 1;
            queueRenderPage(pageNum);
        }
        btnPrev.addEventListener('click', onPrevPage);
        floatPrev.addEventListener('click', () => { if(pageNum > 1) onPrevPage(); });

        function onNextPage() {
            if (isTwoPage) {
                if (pageNum + 1 >= pdfDoc.numPages) return;
                pageNum += 2;
            } else {
                if (pageNum >= pdfDoc.numPages) return;
                pageNum++;
            }
            queueRenderPage(pageNum);
        }
        btnNext.addEventListener('click', onNextPage);
        floatNext.addEventListener('click', () => { 
            const limit = isTwoPage ? pdfDoc.numPages - 1 : pdfDoc.numPages;
            if(pageNum < limit) onNextPage(); 
        });
        
        document.getElementById('zoom_in').addEventListener('click', () => {
            if (scale < 3.0) { scale += 0.25; queueRenderPage(pageNum); }
        });
        
        document.getElementById('zoom_out').addEventListener('click', () => {
            if (scale > 0.5) { scale -= 0.25; queueRenderPage(pageNum); }
        });

        btnTwoPage.addEventListener('click', () => {
            isTwoPage = !isTwoPage;
            if (isTwoPage) {
                btnTwoPage.classList.add('active-toggle');
                if (pageNum % 2 === 0) pageNum--;
            } else {
                btnTwoPage.classList.remove('active-toggle');
            }
            queueRenderPage(pageNum);
        });

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
                btnFullscreen.innerHTML = '<i class="fas fa-compress"></i>';
            } else {
                document.exitFullscreen();
                btnFullscreen.innerHTML = '<i class="fas fa-expand"></i>';
            }
        });

        btnSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            btnSidebar.classList.toggle('active-toggle');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                if (!btnNext.disabled) onNextPage();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (!btnPrev.disabled) onPrevPage();
            }
        });

        // -------------------------------------------------------------------
        // OUTLINE (TOC) LOGIC
        // -------------------------------------------------------------------
        async function navigateToDest(dest) {
            try {
                let explicitDest = dest;
                if (typeof dest === 'string') {
                    explicitDest = await pdfDoc.getDestination(dest);
                }
                if (!explicitDest) return;
                
                const pageRef = explicitDest[0];
                let pageIndex;
                if (typeof pageRef === 'object') {
                    pageIndex = await pdfDoc.getPageIndex(pageRef);
                } else {
                    pageIndex = pageRef;
                }
                
                let targetPageNum = pageIndex + 1;
                if (isTwoPage && targetPageNum % 2 === 0) {
                    targetPageNum--; // Align to left page in two-page mode
                }
                pageNum = targetPageNum;
                queueRenderPage(pageNum);
            } catch (err) {
                console.error("Failed to navigate to destination", err);
            }
        }

        function renderOutline(outline, parentEl, depth = 0) {
            if (!outline || outline.length === 0) return;
            
            outline.forEach(item => {
                const li = document.createElement('li');
                li.className = 'toc-item';
                if (depth > 0) li.classList.add('nested');
                
                li.textContent = item.title;
                if (item.dest) {
                    li.addEventListener('click', () => {
                        navigateToDest(item.dest);
                        if (window.innerWidth <= 768) {
                            sidebar.classList.add('collapsed');
                            btnSidebar.classList.remove('active-toggle');
                        }
                    });
                }
                
                parentEl.appendChild(li);
                
                if (item.items && item.items.length > 0) {
                    renderOutline(item.items, parentEl, depth + 1);
                }
            });
        }

        function renderFallbackToc(tocArray, parentEl, isNested = false) {
            tocArray.forEach(item => {
                if (item.items && item.items.length > 0) {
                    // This is a chapter heading
                    const li = document.createElement('li');
                    li.className = 'toc-chapter';
                    li.textContent = item.title;
                    parentEl.appendChild(li);
                    
                    // Render children
                    const ul = document.createElement('ul');
                    ul.className = 'toc-sublist';
                    renderFallbackToc(item.items, ul, true);
                    parentEl.appendChild(ul);
                } else {
                    // This is a clickable page link
                    const li = document.createElement('li');
                    li.className = 'toc-item';
                    if (isNested) li.classList.add('nested');
                    
                    // Format text with orange number if it matches "01  Topic"
                    let titleText = item.title.trim();
                    const match = titleText.match(/^(\d+)\s+(.*)/);
                    if (match) {
                        li.innerHTML = `<span class="toc-item-num">${match[1]}</span><span class="toc-item-text">${match[2]}</span>`;
                    } else {
                        li.textContent = titleText;
                    }

                    li.addEventListener('click', () => {
                        let targetPageNum = item.page;
                        if (isTwoPage && targetPageNum % 2 === 0) {
                            targetPageNum--;
                        }
                        pageNum = targetPageNum;
                        queueRenderPage(pageNum);
                        if (window.innerWidth <= 768) {
                            sidebar.classList.add('collapsed');
                            btnSidebar.classList.remove('active-toggle');
                        }
                    });
                    parentEl.appendChild(li);
                }
            });
        }

        // -------------------------------------------------------------------
        // FETCH AND LOAD DOCUMENT
        // -------------------------------------------------------------------
        async function loadDocument() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const docName = urlParams.get('doc') || 'GrindOS_CN_Booklet.pdf';
                
                // Dynamically update the topbar title based on the document
                const docToSubject = {
                    'GrindOS_CN_Booklet.pdf': 'Computer Networks',
                    'GrindOS_DBMS_Booklet.pdf': 'Database Systems',
                    'GrindOS_OOPS_Booklet.pdf': 'Object-Oriented Programming',
                    'GrindOS_OS_Booklet.pdf': 'Operating Systems',
                    'GrindOS_SQL_Booklet.pdf': 'SQL Handbook',
                    'GrindOS_SYSTEM_DESIGN_Booklet.pdf': 'System Design',
                    'GrindOS_PROJECTS_Booklet.pdf': 'Projects'
                };
                if (docToSubject[docName]) {
                    document.getElementById('header-title').textContent = docToSubject[docName];
                }

                elStatusMsg.textContent = `Connecting to GrindOS Network...`;
                
                const backendHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://localhost:8000' : '';
                const apiUrl = `${backendHost}/api/practice/document/${docName}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Unauthorized or document not found');
                
                const data = await response.json();
                const signedUrl = data.url;

                elStatusMsg.textContent = "Decrypting Document...";

                const loadingTask = pdfjsLib.getDocument(signedUrl);
                pdfDoc = await loadingTask.promise;
                
                // Auto-fit scale for mobile screens
                if (window.innerWidth < 768) {
                    const firstPage = await pdfDoc.getPage(1);
                    const unscaled = firstPage.getViewport({scale: 1.0});
                    const containerWidth = document.getElementById('pdf-container').clientWidth;
                    scale = (containerWidth - 8) / unscaled.width;
                } else {
                    scale = 1.3;
                }

                document.getElementById('page_count').textContent = pdfDoc.numPages;
                elLoading.style.display = 'none';
                
                // Load Outline (TOC)
                try {
                    const fallbackToc = (typeof TOC_MAPS !== 'undefined') ? TOC_MAPS[docName] : null;
                    const outline = await pdfDoc.getOutline();
                    
                    if (outline && outline.length > 0) {
                        renderOutline(outline, tocList);
                        // Auto-open sidebar on desktop
                        if (window.innerWidth > 768) {
                            setTimeout(() => {
                                sidebar.classList.remove('collapsed');
                                btnSidebar.classList.add('active-toggle');
                            }, 500);
                        }
                    } else if (fallbackToc && fallbackToc.length > 0) {
                        renderFallbackToc(fallbackToc, tocList);
                        if (window.innerWidth > 768) {
                            setTimeout(() => {
                                sidebar.classList.remove('collapsed');
                                btnSidebar.classList.add('active-toggle');
                            }, 500);
                        }
                    } else {
                        tocList.innerHTML = '<li class="empty-toc">No Table of Contents available for this document.</li>';
                    }
                } catch(e) {
                    console.error("Failed to load outline", e);
                }
                
                renderPage(pageNum);
                
            } catch (error) {
                console.error(error);
                elLoading.innerHTML = `
                    <div class="product-loader" style="gap: 12px;">
                        <i class="fas fa-lock error-icon"></i>
                        <div class="status-text" style="color: #ef4444; font-weight: 700;">Access Denied</div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); text-align: center; text-transform: none; max-width: 260px; line-height: 1.5;">
                            ${error.message}. Ensure the GrindOS backend is running.
                        </div>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', loadDocument);
    </script>
</body>
